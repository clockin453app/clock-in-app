<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/account-profile.css') }}">

{{ page_back_html|safe }}

<div class="accountProfilePage">
  <header class="accountProfileHeader">
    <h1>Profile</h1>
    <p>{{ display_name }}</p>
  </header>

  {% if msg and ok %}
    <div class="accountMessage">{{ msg }}</div>
  {% elif msg %}
    <div class="accountMessage isError">{{ msg }}</div>
  {% endif %}

  <section class="accountPanel">
    <h2>My Details</h2>
    <p>Saved from Starter Form. Files are not shown here.</p>

    <div class="accountDetailsBlock">
      {{ details_html|safe }}
    </div>
  </section>

  <section class="accountPanel">
    <h2>Change Password</h2>

    <form method="POST" class="accountForm">
      <input type="hidden" name="csrf" value="{{ csrf }}">

      <label>Current password</label>
      <input class="input" type="password" name="current" required>

      <label>New password</label>
      <input class="input" type="password" name="new1" required>

      <label>Repeat new password</label>
      <input class="input" type="password" name="new2" required>

      <button class="accountPrimaryButton" type="submit">Save</button>
    </form>
  </section>
</div>
